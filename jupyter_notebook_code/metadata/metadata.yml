metadata_version: 1
name: Do words matter? A mathematical model for turn taking in group discussions (Jupyter
  Notebook)
description: We develop and analyze a mathematical model of conversation dynamics
  that predicts speaking time and interaction patterns among participants without
  using speech content. Using automatically parsed audio data from 159 group discussions
  across eleven scientific conferences, we show that key aspects of turn-taking behavior
  can be captured by a simple mechanistic model independent of conversational semantics.
